name: Refresh Goodwill data

# Weekly: per-state Overpass queries for every US Goodwill store (retried, mirror
# fallback), scored offline against bundled Census data, written to
# data/goodwill-us.json. Commits any change, which auto-deploys via Vercel and
# re-pre-renders. No request-time upstream calls on the default path.

on:
  schedule:
    - cron: "17 9 * * 1" # Mondays 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build national Goodwill dataset
        run: npx tsx scripts/build-goodwill-data.ts
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      - name: Commit refreshed data
        run: |
          git config user.name "Michael Lock"
          git config user.email "30240899+milock@users.noreply.github.com"
          git add data/goodwill-us.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: weekly Goodwill data refresh"
            # main may have moved while the (long) build ran, so rebase our data
            # commit on top of the latest main before pushing. Retry a few times
            # in case more commits land during the rebase.
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash origin main && git push && exit 0
              echo "push attempt $i failed; retrying in 5s"
              sleep 5
            done
            echo "could not push after retries" >&2
            exit 1
          fi
