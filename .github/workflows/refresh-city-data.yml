name: Refresh Goodwill data

# Weekly: one nationwide Overpass query for all US Goodwill stores, scored offline
# against bundled Census data, written to data/goodwill-us.json. Commits any
# change, which auto-deploys via Vercel and re-pre-renders. No per-city queries,
# no request-time upstream calls — policy-compliant and rate-limit-proof.

on:
  schedule:
    - cron: "17 9 * * 1" # Mondays 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build national Goodwill dataset
        run: npx tsx scripts/build-goodwill-data.ts
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      - name: Commit refreshed data
        run: |
          git config user.name "Michael Lock"
          git config user.email "30240899+milock@users.noreply.github.com"
          git add data/goodwill-us.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: weekly Goodwill data refresh"
            git push
          fi
