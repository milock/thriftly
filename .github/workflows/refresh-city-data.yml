name: Refresh city data

# Re-runs the precompute weekly so the pre-rendered city/state pages stay current.
# Runs on a fresh runner IP, computing directly (Overpass .de mirror + Census), so
# it never throttles the endpoints production depends on. Commits any changes,
# which auto-deploys via the Vercel git integration and re-pre-renders.

on:
  schedule:
    - cron: "17 9 * * 1" # Mondays 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Precompute city data
        run: npx tsx scripts/build-city-data.ts
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
      - name: Commit refreshed data
        run: |
          git config user.name "Michael Lock"
          git config user.email "30240899+milock@users.noreply.github.com"
          git add data/cities
          if git diff --cached --quiet; then
            echo "No city-data changes."
          else
            git commit -m "chore: weekly city-data refresh"
            git push
          fi
