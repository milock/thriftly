name: Refresh city data

# Re-runs the precompute weekly so the pre-rendered city/state pages stay current.
# Hits the live site's public APIs (no secrets needed); commits any changes, which
# auto-deploys via the Vercel git integration and re-pre-renders with fresh data.

on:
  schedule:
    - cron: "17 9 * * 1" # Mondays 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Precompute city data
        run: npx tsx scripts/build-city-data.ts
        env:
          BASE_URL: https://www.thriftly.xyz
      - name: Commit refreshed data
        run: |
          git config user.name "Michael Lock"
          git config user.email "30240899+milock@users.noreply.github.com"
          git add data/cities
          if git diff --cached --quiet; then
            echo "No city-data changes."
          else
            git commit -m "chore: weekly city-data refresh"
            git push
          fi
